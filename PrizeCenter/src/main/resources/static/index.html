<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrizeCenter 管理后台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .5px;
    }

    header span { color: #7c83fd; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 20px 32px 0;
    }

    .tab-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px 8px 0 0;
      background: #dde1ea;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background .15s;
    }

    .tab-btn.active { background: #fff; color: #5c6bc0; font-weight: 600; }
    .tab-btn:hover:not(.active) { background: #cdd1db; }

    .tab-panel {
      display: none;
      background: #fff;
      margin: 0 32px 32px;
      border-radius: 0 8px 8px 8px;
      padding: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .tab-panel.active { display: block; }

    /* ── Section ── */
    .section { margin-bottom: 36px; }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #444;
      border-left: 3px solid #5c6bc0;
      padding-left: 10px;
      margin-bottom: 16px;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; color: #666; }

    input[type="text"], input[type="number"] {
      padding: 8px 12px;
      border: 1px solid #d0d5dd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      width: 180px;
      transition: border-color .15s;
    }

    input:focus { border-color: #5c6bc0; }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity .15s;
    }

    button:hover { opacity: .85; }

    .btn-primary   { background: #5c6bc0; color: #fff; }
    .btn-success   { background: #43a047; color: #fff; }
    .btn-danger    { background: #e53935; color: #fff; }
    .btn-warning   { background: #fb8c00; color: #fff; }
    .btn-secondary { background: #78909c; color: #fff; }
    .btn-info      { background: #039be5; color: #fff; }
    .btn-sm        { padding: 5px 10px; font-size: 12px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    th {
      background: #f5f6fa;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #e8eaf0;
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }

    tr:hover td { background: #fafbff; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 999;
      max-width: 320px;
    }

    #toast.show { opacity: 1; }
    #toast.ok  { background: #43a047; }
    #toast.err { background: #e53935; }

    /* ── Modal ── */
    .modal-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-mask.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 28px;
      width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }

    .modal h3 { margin-bottom: 18px; font-size: 16px; }
    .modal .form-group { margin-bottom: 12px; width: 100%; }
    .modal input { width: 100%; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 12px;
      background: #e8eaf6;
      color: #5c6bc0;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  🏆 <span>PrizeCenter</span> 管理后台
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('prize')">奖品管理</button>
  <button class="tab-btn" onclick="switchTab('record')">发奖记录</button>
</div>

<!-- ════════════════ 奖品管理 ════════════════ -->
<div id="tab-prize" class="tab-panel active">

  <!-- 添加奖品 -->
  <div class="section">
    <div class="section-title">添加奖品</div>
    <div class="form-row">
      <div class="form-group"><label>Code</label><input id="add-code" type="text" placeholder="prize_001" /></div>
      <div class="form-group"><label>名称</label><input id="add-name" type="text" placeholder="奖品名称" /></div>
      <div class="form-group"><label>描述</label><input id="add-desc" type="text" placeholder="描述" /></div>
      <div class="form-group"><label>库存</label><input id="add-storage" type="number" placeholder="100" min="0" /></div>
      <button class="btn-success" onclick="addPrize()">添加</button>
    </div>
  </div>

  <!-- 按 Code 查询 -->
  <div class="section">
    <div class="section-title">按 Code 查询</div>
    <div class="form-row">
      <div class="form-group"><label>Code</label><input id="search-code" type="text" placeholder="prize_001" /></div>
      <button class="btn-primary" onclick="searchByCode()">查询</button>
    </div>
    <div id="search-result" style="margin-top:14px"></div>
  </div>

  <!-- 发放奖品 -->
  <div class="section">
    <div class="section-title">发放奖品</div>
    <div class="form-row">
      <div class="form-group"><label>Code</label><input id="reward-code" type="text" placeholder="prize_001" /></div>
      <div class="form-group"><label>数量</label><input id="reward-amount" type="number" placeholder="1" min="1" /></div>
      <div class="form-group"><label>业务流水号 (outbizno)</label><input id="reward-outbizno" type="text" placeholder="order_20240501_001" style="width:200px" /></div>
      <button class="btn-warning" onclick="sendReward()">发放</button>
    </div>
  </div>

  <!-- 奖品列表 -->
  <div class="section">
    <div class="section-title" style="display:flex;align-items:center;gap:10px">
      全部奖品
      <button class="btn-secondary btn-sm" onclick="loadPrizes()">刷新</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Code</th><th>名称</th><th>描述</th><th>库存</th><th>创建时间</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="prize-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ════════════════ 发奖记录 ════════════════ -->
<div id="tab-record" class="tab-panel">

  <!-- 统计 -->
  <div class="section">
    <div class="section-title">统计</div>
    <div class="form-row">
      <button class="btn-info" onclick="loadCount()">获取总发奖次数</button>
      <button class="btn-secondary" onclick="loadLastMinute()">最近1分钟记录</button>
      <span id="count-badge" style="font-size:15px"></span>
    </div>
  </div>

  <!-- 按 outbizno 查询 -->
  <div class="section">
    <div class="section-title">按业务流水号查询</div>
    <div class="form-row">
      <div class="form-group"><label>outbizno</label><input id="rec-outbizno" type="text" placeholder="order_20240501_001" style="width:220px" /></div>
      <button class="btn-primary" onclick="searchByOutbizno()">查询</button>
    </div>
    <div id="rec-search-result" style="margin-top:14px"></div>
  </div>

  <!-- 记录列表 -->
  <div class="section">
    <div class="section-title" style="display:flex;align-items:center;gap:10px">
      发奖记录列表
      <button class="btn-secondary btn-sm" onclick="loadRecords()">刷新</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Code</th><th>数量</th><th>outbizno</th><th>时间</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="record-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ════════════════ 编辑弹窗 ════════════════ -->
<div class="modal-mask" id="edit-modal">
  <div class="modal">
    <h3>修改奖品信息</h3>
    <input type="hidden" id="edit-id" />
    <div class="form-group"><label>名称</label><input id="edit-name" type="text" /></div>
    <div class="form-group" style="margin-top:10px"><label>描述</label><input id="edit-desc" type="text" /></div>
    <div class="form-group" style="margin-top:10px"><label>库存</label><input id="edit-storage" type="number" min="0" /></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="submitEdit()">保存</button>
    </div>
  </div>
</div>

<!-- ════════════════ Toast ════════════════ -->
<div id="toast"></div>

<script>
  const BASE = 'http://localhost:8082';

  // ── Toast ──────────────────────────────────────────────
  let toastTimer;
  function toast(msg, ok = true) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + (ok ? 'ok' : 'err');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 2500);
  }

  // ── Tab ────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['prize','record'][i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'prize') loadPrizes();
    if (name === 'record') loadRecords();
  }

  // ── Modal ──────────────────────────────────────────────
  function openModal(id, name, desc, storage) {
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-desc').value = desc;
    document.getElementById('edit-storage').value = storage;
    document.getElementById('edit-modal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
  }

  // ── Util ───────────────────────────────────────────────
  function fmt(dateStr) {
    if (!dateStr) return '-';
    return new Date(dateStr).toLocaleString('zh-CN');
  }

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(BASE + path, opts);
    return res.json();
  }

  // ══════════════ 奖品 APIs ══════════════════════════════

  async function loadPrizes() {
    const data = await api('GET', '/prize/getallprize');
    const tbody = document.getElementById('prize-tbody');
    const list = data.prizeVOList || [];
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:24px">暂无数据</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(p => `
      <tr>
        <td>${p.id}</td>
        <td><span class="badge">${p.code}</span></td>
        <td>${p.name}</td>
        <td style="color:#777">${p.description || '-'}</td>
        <td><b>${p.storage}</b></td>
        <td style="color:#999;font-size:12px">${fmt(p.createTime)}</td>
        <td style="display:flex;gap:6px">
          <button class="btn-warning btn-sm" onclick="openModal(${p.id},'${esc(p.name)}','${esc(p.description||'')}',${p.storage})">编辑</button>
          <button class="btn-danger btn-sm" onclick="deletePrize(${p.id})">删除</button>
        </td>
      </tr>`).join('');
  }

  async function addPrize() {
    const code = val('add-code'), name = val('add-name'),
          description = val('add-desc'), storage = +val('add-storage');
    if (!code || !name) return toast('Code 和名称必填', false);
    const res = await api('POST', '/prize/add', { code, name, description, storage });
    if (res.success) {
      toast('添加成功');
      ['add-code','add-name','add-desc','add-storage'].forEach(id => document.getElementById(id).value = '');
      loadPrizes();
    } else {
      toast(res.errorMessage || '添加失败', false);
    }
  }

  async function searchByCode() {
    const code = val('search-code');
    if (!code) return toast('请输入 Code', false);
    const data = await api('GET', `/prize/search?code=${encodeURIComponent(code)}`);
    const p = data.prizeVO;
    const el = document.getElementById('search-result');
    if (!p) {
      el.innerHTML = '<span style="color:#e53935">未找到该奖品</span>';
      return;
    }
    el.innerHTML = `
      <table style="width:auto"><tbody>
        <tr><td style="color:#999;padding:4px 12px 4px 0">ID</td><td>${p.id}</td></tr>
        <tr><td style="color:#999;padding:4px 12px 4px 0">Code</td><td><span class="badge">${p.code}</span></td></tr>
        <tr><td style="color:#999;padding:4px 12px 4px 0">名称</td><td>${p.name}</td></tr>
        <tr><td style="color:#999;padding:4px 12px 4px 0">描述</td><td>${p.description || '-'}</td></tr>
        <tr><td style="color:#999;padding:4px 12px 4px 0">库存</td><td><b>${p.storage}</b></td></tr>
      </tbody></table>`;
  }

  async function sendReward() {
    const code = val('reward-code'), outbizno = val('reward-outbizno'),
          amount = +val('reward-amount');
    if (!code || !outbizno || !amount) return toast('Code、数量、流水号均必填', false);
    const res = await api('POST', '/prize/send_reward', { code, amount, outbizno });
    if (res.success) {
      toast('发放成功');
      loadPrizes();
    } else {
      toast(res.errorMessage || '发放失败', false);
    }
  }

  async function deletePrize(id) {
    if (!confirm(`确认删除 ID=${id} 的奖品？`)) return;
    const res = await api('DELETE', `/prize/delete?id=${id}`);
    if (res.success) { toast('已删除'); loadPrizes(); }
    else toast(res.errorMessage || '删除失败', false);
  }

  async function submitEdit() {
    const id = +document.getElementById('edit-id').value;
    const name = val('edit-name'), description = val('edit-desc'),
          storage = +val('edit-storage');
    const res = await api('PUT', `/prize/update?id=${id}&storage=${storage}&name=${encodeURIComponent(name)}&description=${encodeURIComponent(description)}`);
    if (res.success) { toast('修改成功'); closeModal(); loadPrizes(); }
    else toast(res.errorMessage || '修改失败', false);
  }

  // ══════════════ 发奖记录 APIs ═════════════════════════

  async function loadRecords() {
    const data = await api('GET', '/prize_reward/get_all');
    const list = data.prizeRecordVOList || [];
    const tbody = document.getElementById('record-tbody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:24px">暂无记录</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(r => `
      <tr>
        <td>${r.id}</td>
        <td><span class="badge">${r.code}</span></td>
        <td>${r.amount}</td>
        <td style="font-size:12px;color:#666">${r.outbizno}</td>
        <td style="color:#999;font-size:12px">${fmt(r.createTime)}</td>
        <td><button class="btn-danger btn-sm" onclick="deleteRecord(${r.id})">删除</button></td>
      </tr>`).join('');
  }

  async function loadCount() {
    const data = await api('GET', '/prize_reward/count');
    document.getElementById('count-badge').innerHTML =
      `总发奖次数：<b style="color:#5c6bc0;font-size:18px">${data.count ?? '-'}</b>`;
  }

  async function loadLastMinute() {
    const data = await api('GET', '/prize_reward/record-by-minutes');
    const list = data.prizeRecordList || [];
    const tbody = document.getElementById('record-tbody');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#aaa;padding:24px">最近1分钟内无记录</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(r => `
      <tr>
        <td>${r.id}</td>
        <td><span class="badge">${r.code}</span></td>
        <td>${r.amount}</td>
        <td style="font-size:12px;color:#666">${r.outbizno}</td>
        <td style="color:#999;font-size:12px">${fmt(r.createTime)}</td>
        <td>-</td>
      </tr>`).join('');
    toast(`最近1分钟共 ${list.length} 条记录`);
  }

  async function searchByOutbizno() {
    const outbizno = val('rec-outbizno');
    if (!outbizno) return toast('请输入流水号', false);
    const data = await api('GET', `/prize_reward/out_biz?outbizno=${encodeURIComponent(outbizno)}`);
    const r = data.prizeRewardVO;
    const el = document.getElementById('rec-search-result');
    if (!r) { el.innerHTML = '<span style="color:#e53935">未找到该记录</span>'; return; }
    el.innerHTML = `
      <table style="width:auto"><tbody>
        <tr><td style="color:#999;padding:4px 12px 4px 0">ID</td><td>${r.id}</td></tr>
        <tr><td style="color:#999;padding:4px 12px 4px 0">Code</td><td><span class="badge">${r.code}</span></td></tr>
        <tr><td style="color:#999;padding:4px 12px 4px 0">数量</td><td>${r.amount}</td></tr>
        <tr><td style="color:#999;padding:4px 12px 4px 0">outbizno</td><td>${r.outbizno}</td></tr>
        <tr><td style="color:#999;padding:4px 12px 4px 0">时间</td><td>${fmt(r.createTime)}</td></tr>
      </tbody></table>`;
  }

  async function deleteRecord(id) {
    if (!confirm(`确认删除记录 ID=${id}？`)) return;
    const res = await api('DELETE', `/prize_reward/delete_by_id?id=${id}`);
    if (res.success) { toast('已删除'); loadRecords(); }
    else toast(res.errorMessage || '删除失败', false);
  }

  // ── Helpers ────────────────────────────────────────────
  function val(id) { return document.getElementById(id).value.trim(); }
  function esc(s) { return s.replace(/'/g, "\\'"); }

  // ── Init ───────────────────────────────────────────────
  loadPrizes();
</script>
</body>
</html>
