# RewardProject 一键部署:中间件(MySQL/Redis/Kafka/MinIO) + 3 后端 + 前端 nginx。
# 用法:cp .env.example .env 填好变量 → docker compose up -d --build
# 仅前端(FRONTEND_PORT)与 MinIO(MINIO_PUBLIC_PORT,预签名音频直连)对外发布端口,
# 其余服务只在 compose 内网可达。详细步骤见 DEPLOY.md。

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?请在 .env 里设置 DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      # 首次启动自动建库建表 + 导种子数据(01~06 按文件名顺序执行)
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      # 预签名音频 URL 由浏览器直连,必须对外;签名主机名见 music 服务的 MINIO_PUBLIC_ENDPOINT
      - "${MINIO_PUBLIC_PORT:-9000}:9000"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  # 一次性初始化:建 bucket(music 私有 / avatars 匿名读)+ 上传默认头像
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 '${MINIO_ACCESS_KEY:-minioadmin}' '${MINIO_SECRET_KEY:-minioadmin}'; do sleep 1; done &&
      mc mb -p local/music local/avatars &&
      mc anonymous set download local/avatars &&
      mc mirror --overwrite /avatars-src local/avatars &&
      echo 'minio init done'"
    volumes:
      - ./assets/avatars:/avatars-src:ro
    restart: "no"

  prize:
    build: ./PrizeCenter
    environment: &common-env
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JAVA_TOOL_OPTIONS: "-Xmx256m"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  reward:
    build: ./Multi_reward
    environment:
      <<: *common-env
      KAFKA_SERVERS: kafka:9092
      PRIZECENTER_BASE_URL: http://prize:8082
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      prize:
        condition: service_started
    restart: unless-stopped

  music:
    build: ./Music_management
    environment:
      <<: *common-env
      KAFKA_SERVERS: kafka:9092
      MULTIREWARD_BASE_URL: http://reward:8080
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MINIO_ENDPOINT: http://minio:9000
      # 预签名 URL 的主机名必须浏览器可达:EC2 上填公网 IP/域名
      MINIO_PUBLIC_ENDPOINT: http://${PUBLIC_HOST:-localhost}:${MINIO_PUBLIC_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - music
      - reward
      - prize
    restart: unless-stopped

volumes:
  mysql-data:
  kafka-data:
  minio-data:
