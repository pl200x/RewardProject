# 生产版路由:与 vite.config.ts 的开发代理一一对应(前缀剥掉后转发)。
server {
    listen 80;
    server_name _;

    # 上传音乐 mp3 走 /api/music,放宽默认 1m 限制(与后端 multipart 30MB 对齐)
    client_max_body_size 30m;

    location /api/music/ {
        proxy_pass http://music:8081/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/reward/ {
        proxy_pass http://reward:8080/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /api/prize/ {
        proxy_pass http://prize:8082/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # MinIO 匿名读(默认头像等);音频走预签名 URL 直连 MinIO 公网端口,不经这里
    location /minio/ {
        proxy_pass http://minio:9000/;
    }

    # SPA:非文件路径全部回落 index.html
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
