server.port=8081
spring.application.name=Music_management
# 数据库/中间件均可用环境变量覆盖(本地默认值见 .env.example;部署时注入真实值)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/test
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mybatis.mapper-locations=classpath:mapper/*.xml

spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=false

spring.redis.host=${REDIS_HOST:127.0.0.1}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}

# 通知邮件 SMTP(账号/授权码来自环境变量,不入库;未配置时发信会失败但不影响其他功能)
spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# MinIO(音乐音频对象存储):bucket music, key = <title>.mp3
minio.endpoint=${MINIO_ENDPOINT:http://127.0.0.1:9000}
# 预签名 URL 用的浏览器可达地址(容器部署时与内网 endpoint 不同;本地留空回落 endpoint)
minio.public-endpoint=${MINIO_PUBLIC_ENDPOINT:}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=music

# Multi_reward 地址(播放上报;部署时外部化覆盖)
integration.multireward.base-url=${MULTIREWARD_BASE_URL:http://localhost:8080}

# 上传音乐:multipart 上限(Spring 默认 1MB,不够放 mp3)
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
